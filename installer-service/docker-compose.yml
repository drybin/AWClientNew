services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: installer
      POSTGRES_PASSWORD: installer
      POSTGRES_DB: installer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U installer"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://installer:installer@postgres:5432/installer
    env_file:
      - .env
    volumes:
      - installers:/data/installers
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  installers:
