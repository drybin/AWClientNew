name: Test Installer

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of build-installer workflow (leave empty for latest)'
        required: false

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Resolve installer run ID
        id: resolve_run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            RUN_ID=$(gh api repos/${{ github.repository }}/actions/workflows/build-installer.yml/runs \
              --jq '.workflow_runs[] | select(.conclusion == "success") | .id' | head -1)
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
            echo "Using latest successful build-installer run: $RUN_ID"
          fi

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: otguru-agent-installer
          github-token: ${{ github.token }}
          run-id: ${{ steps.resolve_run.outputs.run_id }}

      - name: Install MSI silently
        shell: pwsh
        run: |
          Write-Host "Installing OTGuruAgent.msi..."
          $proc = Start-Process msiexec `
            -ArgumentList "/i OTGuruAgent.msi /qn /l*v install.log" `
            -Wait -PassThru
          Write-Host "Exit code: $($proc.ExitCode)"
          if (Test-Path install.log) {
            Write-Host "--- Last 30 lines of install log ---"
            Get-Content install.log | Select-Object -Last 30
          }
          if ($proc.ExitCode -ne 0) {
            Write-Error "FAIL: MSI installation failed (exit code $($proc.ExitCode))"
            exit 1
          }
          Write-Host "PASS: MSI installed successfully"

      - name: Check install path is 64-bit Program Files
        shell: pwsh
        run: |
          $path64 = "C:\Program Files\OTGuruAgent"
          $path32 = "C:\Program Files (x86)\OTGuruAgent"

          if (Test-Path $path32) {
            Write-Error "FAIL: Installed in 32-bit path ($path32) — WiX arch flag missing"
            exit 1
          }
          if (-not (Test-Path $path64)) {
            Write-Error "FAIL: Not found at $path64"
            exit 1
          }
          Write-Host "PASS: Installed at $path64"

      - name: Check required files exist
        shell: pwsh
        run: |
          $dir = "C:\Program Files\OTGuruAgent"
          $required = @(
            "aw-qt.exe",
            "python39.dll"
          )
          $failed = @()
          foreach ($f in $required) {
            if (Test-Path "$dir\$f") {
              Write-Host "PASS: $f"
            } else {
              Write-Host "FAIL: $f — not found"
              $failed += $f
            }
          }
          Write-Host ""
          Write-Host "--- All files in install dir ---"
          Get-ChildItem $dir -Name
          if ($failed.Count -gt 0) { exit 1 }

      - name: Check aw-qt.exe starts without DLL errors
        shell: pwsh
        run: |
          $exe = "C:\Program Files\OTGuruAgent\aw-qt.exe"
          Write-Host "Starting $exe ..."
          $proc = Start-Process $exe -PassThru -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

          if ($proc.HasExited) {
            Write-Error "FAIL: aw-qt.exe exited after $($proc.ExitCode) — DLL or import error"
            exit 1
          }

          Write-Host "PASS: aw-qt.exe running after 5s (no DLL errors)"
          $proc.Kill()

      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-log
          path: install.log
          retention-days: 7
